<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upscaler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        #dropZone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }

        #dropZone:hover, #dropZone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        #fileInput { display: none; }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        #processBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #downloadAllBtn, #clearBtn {
            background: #f0f0f0;
            color: #333;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-item .number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        #imageList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .image-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .image-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .image-info {
            padding: 15px;
            font-size: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
        }

        .download-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Image Upscaler</h1>

        <div id="dropZone">
            <p>📁 Drop images here or click to select</p>
            <small>Supported: JPG, PNG, WebP</small>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="stats">
            <div class="stat-item">
                <div class="number" id="processedCount">0</div>
                <div class="label">Processed</div>
            </div>
            <div class="stat-item">
                <div class="number" id="queueCount">0</div>
                <div class="label">Queued</div>
            </div>
        </div>

        <div class="button-group">
            <button id="processBtn" disabled>⚙️ Process All</button>
            <button id="downloadAllBtn" disabled>💾 Download All</button>
            <button id="clearBtn" disabled>🗑️ Clear</button>
        </div>

        <div id="imageList"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const imageList = document.getElementById('imageList');
        const processBtn = document.getElementById('processBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const processedCount = document.getElementById('processedCount');
        const queueCount = document.getElementById('queueCount');

        let images = [];
        let processed = 0;

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    const id = Date.now() + Math.random();
                    images.push({ id, file, status: 'pending', processedBlob: null });
                    addImageCard(id, file);
                }
            }
            updateStats();
            updateButtons();
        }

        function addImageCard(id, file) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.id = `card-${id}`;

            const reader = new FileReader();
            reader.onload = e => {
                card.innerHTML = `
                    <button class="remove-btn" onclick="removeImage(${id})">×</button>
                    <img src="${e.target.result}" class="image-preview">
                    <div class="image-info">
                        <div class="image-name"><strong>${file.name}</strong></div>
                        <div style="margin: 5px 0;">Original: ${formatBytes(file.size)}</div>
                        <div>Compressed: <span id="new-size-${id}">-</span></div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-${id}"></div>
                        </div>
                        <div class="status" id="status-${id}" style="margin: 10px 0; font-weight: bold;">Ready</div>
                        <button class="download-btn" id="download-${id}" style="display:none" onclick="downloadImage(${id})">Download</button>
                    </div>
                `;
            };
            reader.readAsDataURL(file);
            imageList.appendChild(card);
        }

        async function processAllImages() {
            processBtn.disabled = true;
            processed = 0;

            for (let img of images) {
                if (img.status === 'pending') {
                    await processImage(img);
                }
            }

            processBtn.disabled = false;
            updateButtons();
        }

        async function processImage(imageData) {
            const statusEl = document.getElementById(`status-${imageData.id}`);
            const progressEl = document.getElementById(`progress-${imageData.id}`);
            const newSizeEl = document.getElementById(`new-size-${imageData.id}`);
            const downloadBtn = document.getElementById(`download-${imageData.id}`);

            statusEl.textContent = 'Processing...';
            statusEl.style.color = '#ff9800';
            progressEl.style.width = '30%';

            try {
                const img = await loadImage(imageData.file);
                progressEl.style.width = '60%';

                const blob = await compressToTarget(img, 700);

                if (!blob) throw new Error("Compression failed");

                imageData.processedBlob = blob;
                imageData.status = 'complete';
                processed++;

                progressEl.style.width = '100%';
                statusEl.textContent = '✓ Complete';
                statusEl.style.color = '#4caf50';
                newSizeEl.textContent = formatBytes(blob.size);
                downloadBtn.style.display = 'block';

            } catch (e) {
                console.error(e);
                statusEl.textContent = '✗ Error';
                statusEl.style.color = '#f44336';
            }

            updateStats();
        }

        async function compressToTarget(img, targetKB) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, img.width, img.height);

            let minQ = 0.4;
            let maxQ = 0.95;
            let bestBlob = null;

            for (let i = 0; i < 10; i++) {
                let q = (minQ + maxQ) / 2;

                const blob = await new Promise(res =>
                    canvas.toBlob(res, 'image/jpeg', q)
                );

                if (!blob) continue;

                let sizeKB = blob.size / 1024;

                if (Math.abs(sizeKB - targetKB) < 20) {
                    return blob;
                }

                if (sizeKB > targetKB) {
                    maxQ = q;
                } else {
                    minQ = q;
                    bestBlob = blob;
                }
            }

            return bestBlob;
        }

        function loadImage(file) {
            return new Promise((res, rej) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    res(img);
                };
                img.onerror = rej;
                img.src = url;
            });
        }

        function downloadImage(id) {
            const img = images.find(i => i.id === id);
            if (!img?.processedBlob) return;

            const url = URL.createObjectURL(img.processedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = img.file.name.replace(/\.[^/.]+$/, '') + '_700KB.jpg';
            a.click();
            URL.revokeObjectURL(url);
        }

        async function downloadAll() {
            for (let img of images) {
                if (img.processedBlob) {
                    downloadImage(img.id);
                    await new Promise(r => setTimeout(r, 100));
                }
            }
        }

        function removeImage(id) {
            images = images.filter(i => i.id !== id);
            document.getElementById(`card-${id}`).remove();
            updateStats();
            updateButtons();
        }

        function clearAll() {
            images = [];
            imageList.innerHTML = '';
            processed = 0;
            updateStats();
            updateButtons();
        }

        function updateStats() {
            processedCount.textContent = processed;
            queueCount.textContent = images.length - processed;
        }

        function updateButtons() {
            processBtn.disabled = images.filter(i => i.status === 'pending').length === 0;
            downloadAllBtn.disabled = images.filter(i => i.status === 'complete').length === 0;
            clearBtn.disabled = images.length === 0;
        }

        function formatBytes(bytes) {
            return (bytes / 1024).toFixed(1) + ' KB';
        }

        processBtn.onclick = processAllImages;
        downloadAllBtn.onclick = downloadAll;
        clearBtn.onclick = clearAll;
    </script>
</body>
</html>
